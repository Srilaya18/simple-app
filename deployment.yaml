apiVersion: v1
kind: Service
metadata:
  name: java-service
spec:
  type: NodePort
  selector:
    app: java-app
  ports:
    - port: 8086       # Internal cluster port
      targetPort: 8086 # Port the pod is listening on
      nodePort: 30086  # Port you will use on your machine (range 30000-32767)
